# Content Pipeline Configuration
# 內容生產流水線配置

metadata:
  version: "1.0.0"
  last_updated: "2026-03-31"
  description: "Notes-to-Knowledge Pipeline Configuration"

# ============================================
# Commands Configuration
# ============================================

commands:
  config_file: "config/commands.yaml"
  description: "命令定義配置檔案"

# ============================================
# Pipeline Control Settings
# ============================================

pipeline:
  # 執行模式：stepwise | chain
  # stepwise: 單步執行，不自動觸發下一階段
  # chain: 鏈式執行（已禁用）
  mode: "stepwise"

  # 鏈式執行控制
  chain:
    enable: false          # 禁用鏈式自動執行
    max_depth: 1           # 最大深度=1（僅允許單步）

  # 自動觸發控制
  auto_trigger:
    enable: false          # 禁用自動觸發
    watch: []              # 不監控檔案變更

  # 階段轉換驗證
  transition_validation:
    enable: true           # 啟用階段轉換驗證
    strict_mode: true      # 嚴格模式：僅允許相鄰階段轉換

# ============================================
# Content Settings
# ============================================

content:
  # 預設語系
  language: "zh-TW"
  fallback_language: "en-US"

  # 檔案編碼
  encoding: "UTF-8"

# ============================================
# Path Settings
# ============================================

paths:
  # 階段目錄
  raw_dir: "raw"
  notes_dir: "notes"
  outline_dir: "outline"
  concept_dir: "concept"
  index_dir: "posts"
  post_dir: "posts"
  reports_dir: "reports"

  # 配置目錄
  templates_dir: "templates"
  rules_dir: "rules"
  tasks_dir: ".task"
  viewpoints_dir: "config/viewpoints"

  # 聚合規則
  aggregation_rules: "rules/aggregation.yaml"

# ============================================
# Evidence Settings
# ============================================

evidence:
  # 決策證據存儲策略：all | no | success | fail
  storage: "configurable"
  strategy: "all"          # 保留所有決策證據

  # 證據保留設定
  retention_days: 90       # 保留 90 天

  # 證據索引
  index:
    enable: true           # 啟用證據索引
    auto_update: true      # 自動更新索引

  # 證據搜索
  search:
    enable: true           # 啟用證據搜索
    types:
      - basic              # 基本搜索（ID/階段/時間）
      - fulltext           # 全文搜索
      - tags               # 標籤搜索

# ============================================
# Execution Mode Settings
# ============================================

execution:
  # 預設執行模式：interactive | agent
  default_mode: "agent"    # 預設代理模式

  # 互動模式設定
  interactive:
    step_by_step: true     # 逐步確認
    confirm_decisions: true # 關鍵決策確認
    review_output: true    # 產出審核
    error_handling: "ask"  # 錯誤時詢問使用者

  # 代理模式設定
  agent:
    auto_execute: true     # 全自動執行
    auto_error_handling: true # 錯誤自動處理
    notify_on_complete: true # 產出後通知

# ============================================
# Quality Settings
# ============================================

quality:
  # 質量評分維度
  dimensions:
    - name: "完整性"
      weight: 0.3
      enabled: true

    - name: "一致性"
      weight: 0.25
      enabled: true

    - name: "可讀性"
      weight: 0.25
      enabled: true

    - name: "原創性"
      weight: 0.2
      enabled: true

  # 質量檢查
  validation:
    enable: true           # 啟用質量檢查
    fail_threshold: 0.6    # 低於 60% 警告

# ============================================
# Security Settings
# ============================================

security:
  # 配置加密
  encryption:
    enable: true           # 啟用加密
    algorithm: "AES-256-GCM"
    sensitive_fields:
      - "api_keys.*"
      - "credentials.*"
      - "secrets.*"
    key_management: "env"  # env | file | vault
    key_env_var: "CLAUDE_CONFIG_KEY"
